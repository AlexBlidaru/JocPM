<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bebelușii noștri" />
  <meta name="theme-color" content="#fdf6f0" />
  <title>Fetele cochetele</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #fdf6f0;
      --blush: #f5c9c0;
      --rose: #e8a09a;
      --deep: #7d4e57;
      --text: #3d2a2e;
      --muted: #a8898e;
      --panel-w: 300px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Background subtle texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(245,201,192,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(232,160,154,0.2) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 24px 60px;
      width: 100%;
      max-width: 420px;
      transition: transform 0.4s cubic-bezier(.77,0,.18,1);
    }

    .main.shifted {
      transform: translateX(calc(-1 * var(--panel-w) / 2));
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      color: var(--deep);
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.2;
    }

    h1 span {
      display: block;
      font-size: 1.1rem;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* KICK BUTTON */
    .kick-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .kick-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--blush), var(--rose));
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow:
        0 8px 32px rgba(125,78,87,0.2),
        0 2px 8px rgba(125,78,87,0.1),
        inset 0 1px 0 rgba(255,255,255,0.4);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .kick-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.35) 0%, transparent 65%);
      pointer-events: none;
    }

    .kick-btn:active {
      transform: scale(0.93);
      box-shadow:
        0 4px 16px rgba(125,78,87,0.25),
        0 1px 4px rgba(125,78,87,0.15),
        inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .kick-emoji {
      font-size: 3rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(125,78,87,0.2));
    }

    .kick-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: white;
      letter-spacing: 0.08em;
      text-shadow: 0 1px 3px rgba(125,78,87,0.3);
    }

    /* Ripple animation */
    @keyframes ripple {
      0% { transform: scale(0); opacity: 0.6; }
      100% { transform: scale(4); opacity: 0; }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      width: 60px;
      height: 60px;
      margin-top: -30px;
      margin-left: -30px;
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    /* Today counter */
    .today-box {
      background: white;
      border: 1px solid var(--blush);
      border-radius: 20px;
      padding: 18px 32px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(125,78,87,0.07);
    }

    .today-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 600;
      color: var(--deep);
      line-height: 1;
    }

    .today-label {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Last kick */
    .last-kick {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.03em;
    }

    .last-kick strong {
      color: var(--deep);
      font-weight: 500;
    }

    /* undo */
    .undo-btn {
      background: none;
      border: 1px solid var(--blush);
      border-radius: 40px;
      padding: 5px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 0.68rem;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.75;
    }

    .undo-btn:active { background: var(--blush); color: var(--deep); }

    /* SLIDE PANEL */
    .panel-toggle {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      background: var(--deep);
      color: white;
      border: none;
      border-radius: 12px 0 0 12px;
      width: 32px;
      height: 72px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: -3px 0 12px rgba(125,78,87,0.2);
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .panel-toggle:active { background: var(--rose); }

    .panel-toggle .arrow {
      transition: transform 0.35s cubic-bezier(.77,0,.18,1);
      display: inline-block;
    }

    .panel-toggle.open .arrow {
      transform: rotate(180deg);
    }

    .panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: var(--panel-w);
      background: white;
      z-index: 90;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(.77,0,.18,1);
      box-shadow: -8px 0 40px rgba(125,78,87,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 28px 20px 18px;
      border-bottom: 1px solid var(--blush);
      background: linear-gradient(to bottom, #fff9f7, white);
    }

    .panel-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.5rem;
      color: var(--deep);
    }

    .panel-header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .day-card {
      border: 1px solid #f0e0dd;
      border-radius: 14px;
      padding: 14px 16px;
      background: #fffbfa;
    }

    .day-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .day-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--deep);
    }

    .day-badge {
      background: var(--blush);
      color: var(--deep);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .day-kicks {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .kick-time {
      font-size: 0.72rem;
      color: var(--muted);
      background: #f5eded;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 40px;
      line-height: 1.7;
    }

    .empty-state .emoji { font-size: 2rem; margin-bottom: 8px; }

    .panel-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--blush);
    }

    .download-btn {
      width: 100%;
      background: var(--deep);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .download-btn:active { background: var(--rose); }

    .clear-btn {
      width: 100%;
      background: none;
      border: 1px solid #f0c0bc;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      color: #c08080;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .clear-btn:active { background: #fff0ee; }

    /* MANUAL ADD MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(61,42,46,0.35);
      backdrop-filter: blur(3px);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 480px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(.77,0,.18,1);
      box-shadow: 0 -8px 40px rgba(125,78,87,0.15);
    }

    .modal-overlay.show .modal {
      transform: translateY(0);
    }

    .modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--deep);
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-fields {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .modal-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .modal-field label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .modal-field input {
      border: 1.5px solid var(--blush);
      border-radius: 12px;
      padding: 10px 12px;
      font-family: 'Jost', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: #fffbfa;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .modal-field input:focus { border-color: var(--rose); }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-cancel {
      flex: 1;
      background: none;
      border: 1.5px solid var(--blush);
      border-radius: 12px;
      padding: 12px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
    }

    .modal-save {
      flex: 2;
      background: linear-gradient(135deg, var(--blush), var(--rose));
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(125,78,87,0.2);
    }

    .modal-save:active { opacity: 0.85; }
    .modal-cancel:active { background: #fff0ee; }

    .add-manual-btn {
      width: 100%;
      background: none;
      border: 1.5px dashed var(--blush);
      border-radius: 10px;
      padding: 9px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      color: var(--rose);
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .add-manual-btn:active { background: #fff0ee; }

    .day-active-intervals {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .interval-chip {
      font-size: 0.7rem;
      background: linear-gradient(135deg, #fde8e5, #f5c9c0);
      color: var(--deep);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .interval-label {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Pop animation for kick count */
    @keyframes pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    .pop { animation: pop 0.3s cubic-bezier(.36,.07,.19,.97); }

    /* FLOWER BURST */
    .flowers-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      font-size: 1.6rem;
      animation: flowerFly var(--dur, 1.4s) cubic-bezier(.2,.8,.4,1) forwards;
      opacity: 0;
      transform-origin: center;
    }

    @keyframes flowerFly {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.3) rotate(0deg); }
      15%  { opacity: 1; transform: translate(var(--tx1), var(--ty1)) scale(1.1) rotate(var(--r1)); }
      80%  { opacity: 0.9; transform: translate(var(--tx2), var(--ty2)) scale(1) rotate(var(--r2)); }
      100% { opacity: 0; transform: translate(var(--tx3), var(--ty3)) scale(0.6) rotate(var(--r3)); }
    }

    /* FUNNY MESSAGE TOAST */
    .msg-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: white;
      border: 1.5px solid var(--blush);
      border-radius: 20px;
      padding: 12px 22px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--deep);
      box-shadow: 0 8px 32px rgba(125,78,87,0.15);
      white-space: nowrap;
      max-width: 90vw;
      white-space: normal;
      text-align: center;
      z-index: 998;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    .msg-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* PWA install hint */
    .install-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--deep);
      color: white;
      font-size: 0.72rem;
      padding: 8px 18px;
      border-radius: 30px;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeHint 6s ease forwards;
      white-space: nowrap;
      z-index: 200;
    }

    @keyframes fadeHint {
      0% { opacity: 0; transform: translateX(-50%) translateY(8px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="main" id="main">
  <h1>
    Fetitele iubitele 🌸
    <span>tracker de mișcări</span>
  </h1>

  <div class="kick-wrap">
    <button class="kick-btn" id="kickBtn" onclick="recordKick(event)" aria-label="Înregistrează o mișcare">
      <span class="kick-emoji">🦶</span>
      <span class="kick-label">KICK!</span>
    </button>
  </div>

  <div class="today-box">
    <div class="today-count" id="todayCount">0</div>
    <div class="today-label">mișcări azi</div>
  </div>

  <div class="last-kick" id="lastKick">Nicio mișcare înregistrată încă</div>

  <button class="undo-btn" onclick="undoLast()">↩ Anulează ultima</button>
</div>

<!-- Panel toggle -->
<button class="panel-toggle" id="panelToggle" onclick="togglePanel()" aria-label="Deschide istoricul">
  <span class="arrow">◂</span>
</button>

<!-- History panel -->
<div class="panel" id="panel">
  <div class="panel-header">
    <h2>📋 Istoric</h2>
    <p>Toate mișcările înregistrate</p>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-footer">
    <button class="add-manual-btn" onclick="openManualModal()">✏️ Adaugă manual</button>
    <button class="download-btn" onclick="downloadHistory()">⬇️ Descarcă istoricul (.txt)</button>
    <button class="clear-btn" onclick="clearAll()">🗑 Șterge tot istoricul</button>
  </div>
</div>

<!-- Manual add modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h3>✏️ Adaugă kick manual</h3>
    <div class="modal-fields">
      <div class="modal-field">
        <label>Data</label>
        <input type="date" id="manualDate" />
      </div>
      <div class="modal-field">
        <label>Ora</label>
        <input type="time" id="manualTime" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeManualModal()">Anulează</button>
      <button class="modal-save" onclick="saveManualKick()">🌸 Salvează</button>
    </div>
  </div>
</div>

<div class="flowers-container" id="flowersContainer"></div>
<div class="msg-toast" id="msgToast"></div>

<div class="install-hint" id="installHint">
  💡 Apasă „Partajează" → „Adaugă pe ecranul principal"
</div>

<script>
  const FUNNY_MSGS = [
    "Scuze, mami, mă-ntindeam și eu! 🌸",
    "Bubuialaaa 😅",
    "Ora de gimnastica! 🤸‍♀️",
    "Loc, loc, că suntem două! 👯‍♀️",
    "Asta am fost eu, nu ea!  🙃",
    "Cam inghesuiala, nu te mint! 😤",
    "Bună siuaa! 👋👋",
    "Testăm limitele burticii💅",
    "Bebeluselor, dans! 💃💃",
    "Nu ne certăm, promitem! 🤞 (poate)",
    "Biunaaaa din nou! 🏠",
    "oooh buna dimi mama-pisoi",
    "rutututum 🌟",
  ];

  let msgTimeout = null;

  function showFunnyMessage() {
    const toast = document.getElementById('msgToast');
    const msg = FUNNY_MSGS[Math.floor(Math.random() * FUNNY_MSGS.length)];
    toast.textContent = msg;
    toast.classList.add('show');
    if (msgTimeout) clearTimeout(msgTimeout);
    msgTimeout = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function burstFlowers(originX, originY) {
    const container = document.getElementById('flowersContainer');
    const flowers = ['🌸','🌺','🌷','🌸','💮','🌸','🌺','🌷'];
    const count = 14;

    for (let i = 0; i < count; i++) {
      const el = document.createElement('span');
      el.className = 'flower';
      el.textContent = flowers[Math.floor(Math.random() * flowers.length)];

      // Random trajectory
      const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
      const dist1 = 60 + Math.random() * 60;
      const dist2 = 130 + Math.random() * 100;
      const dist3 = 180 + Math.random() * 120;
      const tx1 = Math.cos(angle) * dist1, ty1 = Math.sin(angle) * dist1 - 20;
      const tx2 = Math.cos(angle) * dist2, ty2 = Math.sin(angle) * dist2 - 60;
      const tx3 = Math.cos(angle) * dist3, ty3 = Math.sin(angle) * dist3 + 40;
      const r1 = (Math.random() - 0.5) * 80;
      const r2 = r1 + (Math.random() - 0.5) * 120;
      const r3 = r2 + (Math.random() - 0.5) * 80;
      const dur = 1.1 + Math.random() * 0.5;
      const delay = Math.random() * 0.12;

      el.style.cssText = `
        left: ${originX}px; top: ${originY}px;
        --tx1: ${tx1}px; --ty1: ${ty1}px;
        --tx2: ${tx2}px; --ty2: ${ty2}px;
        --tx3: ${tx3}px; --ty3: ${ty3}px;
        --r1: ${r1}deg; --r2: ${r2}deg; --r3: ${r3}deg;
        --dur: ${dur}s;
        animation-delay: ${delay}s;
        font-size: ${1.2 + Math.random() * 0.8}rem;
      `;

      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + delay + 0.2) * 1000);
    }
  }

  const STORAGE_KEY = 'gemeni_kicks_v1';

  function loadData() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveData(kicks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(kicks));
  }

  function getDateKey(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateRo(dateKey) {
    const [y, m, d] = dateKey.split('-');
    const months = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function getTodayKey() {
    return getDateKey(Date.now());
  }

  function recordKick(event) {
    const btn = document.getElementById('kickBtn');
    const rect = btn.getBoundingClientRect();

    // Ripple effect
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const x = (event.clientX || rect.left + rect.width/2) - rect.left;
    const y = (event.clientY || rect.top + rect.height/2) - rect.top;
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);

    // Flowers + message
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    burstFlowers(cx, cy);
    showFunnyMessage();

    // Save
    const kicks = loadData();
    kicks.push(Date.now());
    saveData(kicks);

    // Update UI
    updateUI(kicks);

    // Pop animation on count
    const cnt = document.getElementById('todayCount');
    cnt.classList.remove('pop');
    void cnt.offsetWidth;
    cnt.classList.add('pop');

    // Haptic if available
    if (navigator.vibrate) navigator.vibrate(40);
  }

  function undoLast() {
    const kicks = loadData();
    if (!kicks.length) return;
    kicks.pop();
    saveData(kicks);
    updateUI(kicks);
  }

  function clearAll() {
    if (!confirm('Ești sigură că vrei să ștergi tot istoricul? Nu se poate recupera.')) return;
    saveData([]);
    updateUI([]);
  }

  function updateUI(kicks) {
    const todayKey = getTodayKey();
    const todayKicks = kicks.filter(ts => getDateKey(ts) === todayKey);

    // Today count
    document.getElementById('todayCount').textContent = todayKicks.length;

    // Last kick
    const lastEl = document.getElementById('lastKick');
    if (kicks.length > 0) {
      const last = kicks[kicks.length - 1];
      const isToday = getDateKey(last) === todayKey;
      const when = isToday ? `azi la ${formatTime(last)}` : `${formatDateRo(getDateKey(last))} la ${formatTime(last)}`;
      lastEl.innerHTML = `Ultima mișcare: <strong>${when}</strong>`;
    } else {
      lastEl.textContent = 'Nicio mișcare înregistrată încă';
    }

    // Panel
    renderPanel(kicks);
  }

  // Returns top 2 most active 1-hour dynamic windows (sliding, based on actual recordings)
  function getActiveIntervals(timestamps) {
    if (timestamps.length < 2) return [];

    const sorted = [...timestamps].sort((a, b) => a - b);
    const ONE_HOUR = 60 * 60 * 1000;

    // For each kick, count how many kicks fall within the next 1h window starting from it
    let windows = sorted.map(start => {
      const end = start + ONE_HOUR;
      const count = sorted.filter(ts => ts >= start && ts < end).length;
      return { start, end, count };
    });

    // Sort by count desc
    windows.sort((a, b) => b.count - a.count);

    // Pick top 2 non-overlapping windows
    const result = [];
    for (const w of windows) {
      if (result.length >= 2) break;
      // Check it doesn't overlap with already picked windows
      const overlaps = result.some(r => w.start < r.end && w.end > r.start);
      if (!overlaps) result.push(w);
    }

    return result.map(w => {
      const fmt = ts => {
        const d = new Date(ts);
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      };
      return { label: `${fmt(w.start)}–${fmt(w.end)}`, count: w.count };
    });
  }

  function renderPanel(kicks) {
    const body = document.getElementById('panelBody');

    if (!kicks.length) {
      body.innerHTML = `<div class="empty-state"><div class="emoji">🌙</div>Nicio mișcare înregistrată încă.<br>Apasă butonul KICK când simți!</div>`;
      return;
    }

    // Group by day
    const byDay = {};
    kicks.forEach(ts => {
      const key = getDateKey(ts);
      if (!byDay[key]) byDay[key] = [];
      byDay[key].push(ts);
    });

    // Sort days descending
    const days = Object.keys(byDay).sort((a,b) => b.localeCompare(a));

    body.innerHTML = days.map(day => {
      const times = byDay[day];
      const timeChips = times.map(ts => `<span class="kick-time">${formatTime(ts)}</span>`).join('');
      const isToday = day === getTodayKey();
      const intervals = getActiveIntervals(times);
      const intervalHtml = intervals.length ? `
        <div class="interval-label">🔥 Intervale active</div>
        <div class="day-active-intervals">
          ${intervals.map(iv => `<span class="interval-chip">${iv.label} <strong>(${iv.count})</strong></span>`).join('')}
        </div>` : '';
      return `
        <div class="day-card">
          <div class="day-card-header">
            <span class="day-date">${isToday ? '🌸 Azi' : formatDateRo(day)}</span>
            <span class="day-badge">🦶 ${times.length} ${times.length === 1 ? 'lovitură' : 'lovituri'}</span>
          </div>
          <div class="day-kicks">${timeChips}</div>
          ${intervalHtml}
        </div>
      `;
    }).join('');
  }

  function downloadHistory() {
    const kicks = loadData();
    if (!kicks.length) { alert('Nu există niciun kick înregistrat încă!'); return; }

    const byDay = {};
    kicks.forEach(ts => {
      const key = getDateKey(ts);
      if (!byDay[key]) byDay[key] = [];
      byDay[key].push(ts);
    });

    const days = Object.keys(byDay).sort((a,b) => a.localeCompare(b));
    const months = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];

    let lines = [];
    lines.push('🌸 Istoricul mișcărilor bebelușilor 🌸');
    lines.push('═'.repeat(36));
    lines.push('');

    days.forEach(day => {
      const [y, m, d] = day.split('-');
      const dateStr = `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
      const times = byDay[day];
      lines.push(`📅 ${dateStr} — ${times.length} ${times.length === 1 ? 'lovitură' : 'lovituri'}`);
      times.forEach(ts => {
        lines.push(`   🦶 ${formatTime(ts)}`);
      });
      lines.push('');
    });

    lines.push('─'.repeat(36));
    lines.push(`Total: ${kicks.length} mișcări înregistrate`);

    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `miscari-bebelusi-${getTodayKey()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function openManualModal() {
    // Default: today + current time
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('manualDate').value =
      `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    document.getElementById('manualTime').value =
      `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeManualModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeManualModal();
  }

  function saveManualKick() {
    const dateVal = document.getElementById('manualDate').value;
    const timeVal = document.getElementById('manualTime').value;
    if (!dateVal || !timeVal) { alert('Te rog completează data și ora!'); return; }

    const ts = new Date(`${dateVal}T${timeVal}:00`).getTime();
    if (isNaN(ts)) { alert('Dată sau oră invalidă.'); return; }

    const kicks = loadData();
    kicks.push(ts);
    kicks.sort((a,b) => a - b); // keep sorted
    saveData(kicks);
    updateUI(kicks);
    closeManualModal();
  }

  let panelOpen = false;

  function togglePanel() {
    panelOpen = !panelOpen;
    document.getElementById('panel').classList.toggle('open', panelOpen);
    document.getElementById('panelToggle').classList.toggle('open', panelOpen);
    document.getElementById('main').classList.toggle('shifted', panelOpen);
  }

  // Init
  const kicks = loadData();
  updateUI(kicks);

  // Show install hint on first visit (iOS)
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const hintShown = localStorage.getItem('hint_shown');
  if (isIOS && !hintShown) {
    localStorage.setItem('hint_shown', '1');
  } else {
    document.getElementById('installHint').style.display = 'none';
  }
</script>
</body>
