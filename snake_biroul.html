<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 Biroul Snake</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --accent: #22d3ee;
  --accent2: #f59e0b;
  --green: #4ade80;
  --red: #f87171;
  --purple: #a78bfa;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --border: #1e293b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── STARS BG ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,.2) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── SELECT SCREEN ── */
#selectScreen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10;
  background: var(--bg);
  gap: 28px;
  padding: 20px;
}

.game-title {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  letter-spacing: -.03em;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-align: center;
  line-height: 1.1;
}
.game-subtitle {
  font-size: clamp(.85rem, 2vw, 1rem);
  color: var(--text2);
  text-align: center;
  max-width: 400px;
}

.select-label {
  font-size: .8rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
}

.chars-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  max-width: 620px;
  width: 100%;
}

.char-card {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  cursor: pointer;
  padding: 14px 8px;
  border-radius: 16px;
  border: 2px solid var(--border);
  background: var(--bg2);
  transition: all .2s ease;
  position: relative;
  overflow: hidden;
}
.char-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(34,211,238,.08));
  opacity: 0; transition: opacity .2s;
}
.char-card:hover { border-color: var(--accent); transform: translateY(-4px); }
.char-card:hover::before { opacity: 1; }
.char-card.selected { border-color: var(--green); background: rgba(74,222,128,.1); }
.char-card.selected::after {
  content: '✓'; position: absolute; top: 6px; right: 8px;
  color: var(--green); font-size: 14px; font-weight: 900;
}

.char-avatar {
  width: 150px; height: 150px; border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 3px solid var(--border);
  transition: border-color .2s;
}
.char-card.selected .char-avatar { border-color: var(--green); }
.char-card:hover .char-avatar { border-color: var(--accent); }

.char-name {
  font-size: .7rem;
  font-weight: 600;
  text-align: center;
  color: var(--text2);
  line-height: 1.3;
}
.char-card.selected .char-name { color: var(--green); }

.btn-start {
  padding: 14px 48px;
  background: linear-gradient(135deg, var(--accent), #0891b2);
  color: #fff;
  border: none; border-radius: 50px;
  font-size: 1.1rem; font-weight: 800;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 4px 20px rgba(34,211,238,.35);
  letter-spacing: .02em;
}
.btn-start:hover:not(:disabled) {
  transform: scale(1.05);
  box-shadow: 0 6px 28px rgba(34,211,238,.5);
}
.btn-start:disabled { opacity: .4; cursor: not-allowed; }

/* ── GAME SCREEN ── */
#gameScreen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 500px;
  padding: 12px;
  position: relative;
  z-index: 5;
}

.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 440px;
  padding: 10px 16px;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.hud-label { font-size: .65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text2); }
.hud-val { font-size: 1.2rem; font-weight: 900; color: var(--accent); font-variant-numeric: tabular-nums; }
.hud-player { display: flex; align-items: center; gap: 8px; }
.hud-avatar { width: 94px; height: 94px; border-radius: 50%; object-fit: cover; object-position: top; border: 2px solid var(--accent); }
.hud-pname { font-size: .75rem; font-weight: 700; color: var(--text); }

canvas {
  border-radius: 16px;
  border: 2px solid var(--border);
  display: block;
  max-width: 100%;
  touch-action: none;
  box-shadow: 0 0 40px rgba(34,211,238,.12);
}

/* ── MESSAGE OVERLAY ── */
#msgOverlay {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(8px);
  z-index: 20;
}

.msg-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 40px;
  text-align: center;
  max-width: 360px;
  width: 90%;
  animation: popIn .3s ease;
}
@keyframes popIn {
  from { transform: scale(.8); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.msg-emoji { font-size: 3.5rem; margin-bottom: 12px; line-height: 1; }
.msg-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
.msg-sub   { font-size: .9rem; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.msg-score { font-size: 2rem; font-weight: 900; color: var(--accent2); margin-bottom: 20px; }

.msg-eaten-list {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-bottom: 20px;
}
.eaten-chip {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.06);
  border-radius: 20px; padding: 4px 10px;
  font-size: .75rem; font-weight: 600;
}
.eaten-chip img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; object-position: top; }

.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-play { padding: 11px 28px; border-radius: 50px; border: none; font-size: .9rem; font-weight: 700; cursor: pointer; transition: all .2s; }
.btn-play.primary { background: var(--accent); color: #000; }
.btn-play.primary:hover { opacity: .85; }
.btn-play.secondary { background: var(--border); color: var(--text); }
.btn-play.secondary:hover { background: #2a3447; }

/* ── D-PAD (mobile) ── */
#dpad {
  display: none;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap: 4px;
  margin-top: 8px;
}
@media (max-width: 600px) { #dpad { display: grid; } }
@media (hover: none) { #dpad { display: grid; } }

.dpad-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.dpad-btn:active { background: var(--accent); color: #000; }
.dpad-center { background: transparent; border: none; cursor: default; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 10px 22px;
  font-size: .85rem; font-weight: 600;
  white-space: nowrap;
  z-index: 30;
  transition: transform .3s ease, opacity .3s;
  opacity: 0;
  max-width: 90vw;
  text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>

<!-- SELECT SCREEN -->
<div id="selectScreen">
  <div>
    <div class="game-title">🐍 Biroul Snake</div>
    <div class="game-subtitle" style="margin-top:8px">Alege personajul și mănâncă-ți colegii!</div>
  </div>
  <div class="select-label">Alege cine ești tu</div>
  <div class="chars-grid" id="charsGrid"></div>
  <button class="btn-start" id="btnStart" disabled onclick="startGame()">🎮 HAI LA JOC!</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen">
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">Scor</span>
      <span class="hud-val" id="scoreVal">0</span>
    </div>
    <div class="hud-player">
      <img class="hud-avatar" id="hudAvatar" src="" alt="">
      <span class="hud-pname" id="hudName"></span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Nivel</span>
      <span class="hud-val" id="levelVal">1</span>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="dpad">
    <div></div>
    <button class="dpad-btn" id="dUp">▲</button>
    <div></div>
    <button class="dpad-btn" id="dLeft">◀</button>
    <div class="dpad-center"></div>
    <button class="dpad-btn" id="dRight">▶</button>
    <div></div>
    <button class="dpad-btn" id="dDown">▼</button>
    <div></div>
  </div>
</div>

<!-- MESSAGE OVERLAY -->
<div id="msgOverlay">
  <div class="msg-box">
    <div class="msg-emoji" id="msgEmoji">😵</div>
    <div class="msg-title" id="msgTitle">Game Over</div>
    <div class="msg-sub"   id="msgSub">Ai dat de perete!</div>
    <div class="msg-score" id="msgScore">0 pts</div>
    <div class="msg-eaten-list" id="msgEatenList"></div>
    <div class="btn-row">
      <button class="btn-play primary" onclick="restartGame()">🔄 Din nou!</button>
      <button class="btn-play secondary" onclick="backToSelect()">🏠 Acasă</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ──────────────────────────────────────────────
//  GAME LOGIC
// ──────────────────────────────────────────────

// Amuzante mesaje per coleg mâncat
const EAT_MSGS = {
  alex: ["Alex a plecat în concediu… definitiv 😈", "Beleaua a fost eliminată! 💀", "Alex? Ce Alex? 😇"],
  ferche: ["Fercheșul Olteniței — mâncat cu tot cu costum 👔", "Ferche-ness level: 0 🪦", "Olteniță plânge 😢"],
  giani: ["Giani, NU mai vii acasă! 🏠", "Ochii mari n-au ajutat 👀", "Giani e out! Irrr! 😜"],
  radu: ["Radu Mazăre — arestat de șarpe 🚔", "Ochelarii n-au ajutat 🕶️", "Radu a scăpat de biroul fiscal… direct în burta mea! 😂"],
  roxana: ["ȘEFA ȘEFELOR — mâncată! Scandal mare! 🔥", "Roxana aprobă acest final 📋", "Cine-i șefă acum, hm? 👑"],
};

const DEATH_MSGS = [
  "Ai dat de perete ca la ședința de luni 😬",
  "Te-ai mâncat singur. Clasic! 🤦",
  "Ai intrat în propria coadă. Ca proiectele noastre... 🌀",
  "Game over. Cel puțin nu ești la birou! 🎉",
  "Roxana o să audă de asta 😅",
];

// ── Canvas setup ──
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CELL = 20;
let COLS, ROWS, W, H;

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 24, 440);
  COLS = Math.floor(maxW / CELL);
  ROWS = Math.floor((window.innerHeight * 0.58) / CELL);
  COLS = Math.max(16, COLS);
  ROWS = Math.max(16, ROWS);
  W = COLS * CELL;
  H = ROWS * CELL;
  canvas.width  = W;
  canvas.height = H;
}
resizeCanvas();

// ── Game state ──
let snake, dir, nextDir, food, score, level, speed, loopId;
let selectedChar = null;
let eatenCounts = {};
let foodImg = null, foodCharKey = null;
let headImg = null;
let headImgEl = null, foodImgEl = null;
let paused = false;
let started = false;

// ── SELECT SCREEN ──
function buildSelectScreen() {
  const grid = document.getElementById('charsGrid');
  grid.innerHTML = '';
  Object.entries(CHARS).forEach(([key, ch]) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.key = key;
    card.innerHTML = `
      <img class="char-avatar" src="${ch.img}" alt="${ch.short}" loading="lazy">
      <span class="char-name">${ch.name.replace(' ', '<br>')}</span>
    `;
    card.onclick = () => selectChar(key);
    grid.appendChild(card);
  });
}

function selectChar(key) {
  selectedChar = key;
  document.querySelectorAll('.char-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.key === key);
  });
  document.getElementById('btnStart').disabled = false;
}

// ── START GAME ──
function startGame() {
  if (!selectedChar) return;
  document.getElementById('selectScreen').style.display = 'none';
  const gs = document.getElementById('gameScreen');
  gs.style.display = 'flex';

  // HUD
  const ch = CHARS[selectedChar];
  document.getElementById('hudAvatar').src = ch.img;
  document.getElementById('hudName').textContent = ch.short;

  // preload head image
  headImgEl = new Image();
  headImgEl.src = ch.img;

  resetGame();
  bindKeys();
}

function resetGame() {
  resizeCanvas();
  snake = [
    { x: Math.floor(COLS/2),     y: Math.floor(ROWS/2) },
    { x: Math.floor(COLS/2) - 1, y: Math.floor(ROWS/2) },
    { x: Math.floor(COLS/2) - 2, y: Math.floor(ROWS/2) },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  speed = 150;
  eatenCounts = {};
  Object.keys(CHARS).forEach(k => eatenCounts[k] = 0);
  updateHUD();
  placeFood();
  started = true;
  if (loopId) clearTimeout(loopId);
  loop();
}

// ── FOOD ──
function placeFood() {
  // pick a random coleg that's NOT the player
  const others = Object.keys(CHARS).filter(k => k !== selectedChar);
  foodCharKey = others[Math.floor(Math.random() * others.length)];
  foodImgEl = new Image();
  foodImgEl.src = CHARS[foodCharKey].img;

  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// ── LOOP ──
function loop() {
  if (!started) return;
  update();
  draw();
  loopId = setTimeout(loop, speed);
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver('wall'); return;
  }
  // Self collision (skip first few frames)
  if (snake.slice(1).some(s => s.x === head.x && s.y === head.y)) {
    gameOver('self'); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    eatenCounts[foodCharKey] = (eatenCounts[foodCharKey] || 0) + 1;
    showToast(randomFrom(EAT_MSGS[foodCharKey] || ['Om! 😋']), foodCharKey);
    // Level up every 5 food
    const total = Object.values(eatenCounts).reduce((a,b)=>a+b,0);
    if (total % 5 === 0) {
      level++;
      speed = Math.max(60, speed - 15);
      showToast(`⚡ NIVEL ${level}! Mai repede!`, null);
    }
    updateHUD();
    placeFood();
  } else {
    snake.pop();
  }
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.fillStyle = '#0d1424';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(30,41,59,.7)';
  ctx.lineWidth = .5;
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.strokeRect(x*CELL, y*CELL, CELL, CELL);
    }
  }

  // Snake body
  const bodyColor = '#22d3ee';
  snake.forEach((seg, i) => {
    if (i === 0) return; // head drawn last
    const alpha = 1 - (i / snake.length) * 0.6;
    ctx.fillStyle = `rgba(34,211,238,${alpha})`;
    const pad = i < 2 ? 1 : 3;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, 4);
    ctx.fill();
    // Eyes on segments 1-3
    if (i === 1 || i === 2) {
      ctx.fillStyle = 'rgba(0,0,0,.3)';
      ctx.fillRect(seg.x*CELL+5, seg.y*CELL+5, 3, 3);
      ctx.fillRect(seg.x*CELL+CELL-8, seg.y*CELL+5, 3, 3);
    }
  });

  // Snake head — with avatar
  if (snake.length > 0) {
    const h = snake[0];
    const hx = h.x*CELL, hy = h.y*CELL;
    ctx.save();
    ctx.beginPath();
    ctx.arc(hx + CELL/2, hy + CELL/2, CELL/2 - 1, 0, Math.PI*2);
    ctx.clip();
    if (headImgEl && headImgEl.complete) {
      ctx.drawImage(headImgEl, hx, hy, CELL, CELL);
    } else {
      ctx.fillStyle = '#22d3ee';
      ctx.fillRect(hx, hy, CELL, CELL);
    }
    ctx.restore();
    // Outline
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(hx + CELL/2, hy + CELL/2, CELL/2 - 1, 0, Math.PI*2);
    ctx.stroke();
  }

  // Food
  if (food) {
    const fx = food.x*CELL, fy = food.y*CELL;
    // Pulsing ring
    const t = Date.now() * .003;
    const pulse = 1 + Math.sin(t) * 0.15;
    ctx.save();
    ctx.beginPath();
    ctx.arc(fx+CELL/2, fy+CELL/2, (CELL/2)*pulse, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(245,158,11,${0.5 + Math.sin(t)*.3})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Avatar
    ctx.save();
    ctx.beginPath();
    ctx.arc(fx+CELL/2, fy+CELL/2, CELL/2 - 2, 0, Math.PI*2);
    ctx.clip();
    if (foodImgEl && foodImgEl.complete) {
      ctx.drawImage(foodImgEl, fx+2, fy+2, CELL-4, CELL-4);
    } else {
      ctx.fillStyle = '#f59e0b';
      ctx.fill();
    }
    ctx.restore();
    // Gold outline
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(fx+CELL/2, fy+CELL/2, CELL/2-2, 0, Math.PI*2);
    ctx.stroke();

    // Name tag
    ctx.fillStyle = 'rgba(245,158,11,.9)';
    ctx.font = `bold ${Math.max(8,CELL*.45)}px sans-serif`;
    ctx.textAlign = 'center';
    const label = CHARS[foodCharKey]?.short || '';
    ctx.fillText(label, fx+CELL/2, fy+CELL+9);
  }
}

// ── GAME OVER ──
function gameOver(reason) {
  started = false;
  clearTimeout(loopId);

  const isWall = reason === 'wall';
  const deathMsg = randomFrom(DEATH_MSGS);

  document.getElementById('msgEmoji').textContent = isWall ? '💥' : '🌀';
  document.getElementById('msgTitle').textContent = isWall ? 'BUM! Perete!' : 'Te-ai mâncat singur!';
  document.getElementById('msgSub').textContent = deathMsg;
  document.getElementById('msgScore').textContent = `${score} puncte`;

  // Eaten list
  const list = document.getElementById('msgEatenList');
  list.innerHTML = '';
  Object.entries(eatenCounts).forEach(([k, cnt]) => {
    if (cnt > 0) {
      const ch = CHARS[k];
      list.innerHTML += `
        <div class="eaten-chip">
          <img src="${ch.img}" alt="${ch.short}">
          ${ch.short}: ×${cnt}
        </div>`;
    }
  });
  if (list.innerHTML === '') {
    list.innerHTML = `<div style="color:var(--text2);font-size:.8rem">N-ai mâncat pe nimeni 😶</div>`;
  }

  const overlay = document.getElementById('msgOverlay');
  overlay.style.display = 'flex';
}

function restartGame() {
  document.getElementById('msgOverlay').style.display = 'none';
  resetGame();
}

function backToSelect() {
  document.getElementById('msgOverlay').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('selectScreen').style.display = 'flex';
  started = false;
  clearTimeout(loopId);
}

// ── HUD ──
function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('levelVal').textContent = level;
}

// ── CONTROLS ──
function bindKeys() {
  document.addEventListener('keydown', onKey);
  // D-pad
  document.getElementById('dUp').addEventListener('click',    () => setDir(0,-1));
  document.getElementById('dDown').addEventListener('click',  () => setDir(0,1));
  document.getElementById('dLeft').addEventListener('click',  () => setDir(-1,0));
  document.getElementById('dRight').addEventListener('click', () => setDir(1,0));

  // Touch swipe
  let tx=0, ty=0;
  canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, { passive:false });
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    e.preventDefault();
  }, { passive:false });
}

function onKey(e) {
  switch(e.key) {
    case 'ArrowUp':    case 'w': case 'W': setDir(0,-1); e.preventDefault(); break;
    case 'ArrowDown':  case 's': case 'S': setDir(0,1);  e.preventDefault(); break;
    case 'ArrowLeft':  case 'a': case 'A': setDir(-1,0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': setDir(1,0);  e.preventDefault(); break;
  }
}

function setDir(x, y) {
  if (!started) return;
  // prevent reversing
  if (x !== 0 && dir.x !== 0) return;
  if (y !== 0 && dir.y !== 0) return;
  nextDir = { x, y };
}

// ── TOAST ──
let toastTimer;
function showToast(msg, charKey) {
  const t = document.getElementById('toast');
  const ch = charKey ? CHARS[charKey] : null;
  t.innerHTML = ch
    ? `<img src="${ch.img}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;object-position:top;vertical-align:middle;margin-right:6px"> ${msg}`
    : msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function randomFrom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ── INIT ──
buildSelectScreen();

// RequestAnimationFrame for smooth rendering
function rafDraw() {
  if (started) draw();
  requestAnimationFrame(rafDraw);
}
requestAnimationFrame(rafDraw);

window.addEventListener('resize', () => {
  if (started) resizeCanvas();
});
</script>
